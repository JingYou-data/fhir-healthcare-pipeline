version: 2

models:
  - name: stg_patients
    description: "Staged patient demographics from FHIR Bronze layer"
    columns:
      - name: patient_id
        description: "Unique patient identifier"
        tests:
          - unique
          - not_null
      - name: birth_date
        tests:
          - not_null
      - name: gender
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['male', 'female', 'unknown']
      - name: age_years
        tests:
          - not_null

  - name: stg_encounters
    description: "Staged encounter records from FHIR Bronze layer"
    columns:
      - name: encounter_id
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_patients')
                field: patient_id
      - name: encounter_start
        tests:
          - not_null

  - name: stg_conditions
    description: "Staged condition records from FHIR Bronze layer"
    columns:
      - name: condition_id
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
      - name: condition_code
        tests:
          - not_null

  - name: stg_medications
    description: "Staged medication records from FHIR Bronze layer"
    columns:
      - name: medication_id
        tests:
          - unique
          - not_null
      - name: patient_id
        tests:
          - not_null
      - name: medication_code
        tests:
          - not_null:
              config:
                severity: warn